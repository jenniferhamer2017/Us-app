<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A Little Message</title>

<!-- Penguin icon for iPhone home screen --> <link rel="apple-touch-icon" href="penguin.png">

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg,#e8e6ff,#f7f5ff,#fff0f6);
  text-align:center;
  padding:30px;
  transition: background 1s ease;
}

h1{
  font-weight:500;
  color:#444;
  margin-bottom:40px;
}

button{
  background:white;
  border:none;
  padding:18px 34px;
  font-size:18px;
  border-radius:30px;
  box-shadow:0 6px 18px rgba(0,0,0,0.12);
  cursor:pointer;
  transition:all .2s ease;
}

button:hover{
  transform:scale(1.05);
}

#quote{
  margin-top:40px;
  font-size:24px;
  max-width:520px;
  line-height:1.5;
  color:#333;
  opacity:0;
  transform:translateY(10px);
  transition:all .6s ease;
}

.show{
  opacity:1;
  transform:translateY(0);
}

@keyframes colorShift {
  0% {background: linear-gradient(135deg,#e8e6ff,#f7f5ff,#fff0f6);}
  50% {background: linear-gradient(135deg,#fff0f6,#e0f7ff,#e8e6ff);}
  100% {background: linear-gradient(135deg,#e8e6ff,#f7f5ff,#fff0f6);}
}

</style>
</head>

<body>

<h1>Tap for a little message 🐧</h1>

<button onclick="newQuote()">Give me one</button>

<div id="quote"></div>

<script>

const quotes = [
  "You make the world softer just by being in it.",
  "I’m proud of you today.",
  "You’re stronger than the hard moments.",
  "You are loved more than you realise.",
  "Everything will work out in its own time.",
  "You always find a way through.",
  "The world is brighter because of you.",
  "Take a breath. You're doing better than you think.",
  "You deserve kindness today.",
  "I'm always rooting for you."
];

function newQuote(){
  const random = Math.floor(Math.random() * quotes.length);
  const quoteBox = document.getElementById("quote");

  // reset fade-in
  quoteBox.classList.remove("show");

  setTimeout(() => {
    quoteBox.innerText = quotes[random];
    quoteBox.classList.add("show");

    // trigger subtle background animation
    document.body.style.animation = 'colorShift 1s ease';
    setTimeout(()=>{document.body.style.animation = ''},1000);

  }, 200);
}

</script>

</body>
</html>
