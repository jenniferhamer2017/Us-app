h1{
color:#444;
}

button{
background:#7a5cff;

</head>

<body>

<h1>Press for a memory ❤️</h1>

<button onclick="newQuote()">Give me one</button>

<div id="quote"></div>

<script>

const quotes = [
"Fancy a quick walk?- nervous but wonderful - checking out my bum as I climb over the stile 😂", "First chat & cuppa at my house, wonderful instant connection🥰", "You going in for a peck on the cheek and me going for lips... you ending up with hair 😂", "The perfect hug(s) in my hallway...I've got a runny nose... is that attractive?😂", "Going out for my birthday in Aloy. The most incredible day spending it together 🥰","Spending our first night together at Christmas, so perfect and natural and easy🥰", "Many wonderful chats and conversations at your kitchen table, holding hands and getting lost in each others eyes💕","Going out to Aloy at 2am in the morning to bring in the blanket 🤭 - me having the least stealth shoes ever - 🐎","Secret kisses and.. other stuff in my living room 😮‍💨", "Countles elf moments 🧝‍♀️... insane connection"  
];

function newQuote(){
const random = Math.floor(Math.random() * quotes.length); document.getElementById("quote").innerText = quotes[random]; }

</script>
