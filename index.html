<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Us</title>

<style>
body{
font-family: Arial, sans-serif;
text-align:center;
background:#f6f3ff;
padding-top:100px;
}

h1{
color:#444;
}

button{
background:#7a5cff;
color:white;
border:none;
padding:15px 30px;
font-size:30px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#5c45cc;
}

#quote{
margin-top:40px;
font-size:30px;
color:#333;
max-width:500px;
margin-left:auto;
margin-right:auto;
}
</style>
</head>

<body>

<h1>Press for a memory ❤️</h1>

<button onclick="newQuote()">Give me one</button>

<div id="quote"></div>

<script>

const quotes = [
"Fancy a Quick Walk? 10/10/25 12pm - nervous but wonderful - checking out my bum as I climb over the stile 😀", "First chat & cuppa at my house, wonderful instant connection🥰"
];

function newQuote(){
const random = Math.floor(Math.random() * quotes.length); document.getElementById("quote").innerText = quotes[random]; }

</script>

</body>

</html>
